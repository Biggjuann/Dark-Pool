# Alembic configuration for Dark Pool Tracker
# Run migrations:  alembic upgrade head
# Create revision: alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic

# Use the same DATABASE_URL env var as the app.
# The %(here)s token resolves to the directory containing this file.
sqlalchemy.url = sqlite:///%(here)s/darkpool.db

# Logging configuration — change to DEBUG to see generated SQL
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
